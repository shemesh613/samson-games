<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏠 מצב בית | משחקי שמשון</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'Heebo',sans-serif;direction:rtl;background:#06061a;color:#fff;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,#1a0a3a 0,transparent 60%),radial-gradient(ellipse at 80% 20%,#0a1a3a 0,transparent 60%),radial-gradient(ellipse at 50% 80%,#0a2a1a 0,transparent 60%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:24px 16px 60px}
.head{text-align:center;margin-bottom:24px}
.logo{font-size:3rem;filter:drop-shadow(0 0 20px rgba(255,180,0,.6))}
h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,#FFD700,#FF6B00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{color:rgba(255,255,255,.6);font-size:1rem;margin-top:4px}
.back{position:fixed;top:14px;right:14px;z-index:5;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:12px;padding:8px 14px;font-family:'Heebo';font-weight:700;text-decoration:none;font-size:.85rem}
.panel{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:24px;padding:26px 22px;margin-bottom:18px}
.btn{border:none;border-radius:16px;padding:16px 22px;font-family:'Heebo';font-size:1.1rem;font-weight:900;cursor:pointer;transition:transform .15s,box-shadow .15s;color:#000}
.btn:hover{transform:scale(1.03)}
.btn.gold{background:linear-gradient(135deg,#FFD700,#FF9500);box-shadow:0 4px 20px rgba(255,180,0,.4)}
.btn.blue{background:linear-gradient(135deg,#00BFFF,#7B2FFF);color:#fff;box-shadow:0 4px 20px rgba(0,150,255,.4)}
.btn.ghost{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.18);box-shadow:none}
.btn.sm{padding:8px 14px;font-size:.95rem;border-radius:12px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
input{width:100%;padding:14px 16px;border-radius:14px;border:2px solid rgba(255,255,255,.15);background:rgba(0,0,0,.3);color:#fff;font-family:'Heebo';font-size:1.1rem;text-align:center;margin-bottom:12px}
input:focus{outline:none;border-color:#FFD700}
.choice{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:560px){.choice{grid-template-columns:1fr}}
.hidden{display:none!important}
.code-box{text-align:center;margin-bottom:18px}
.code-box .lbl{color:rgba(255,255,255,.6);font-size:.9rem}
.code-box .code{font-size:3rem;font-weight:900;letter-spacing:.3em;color:#FFD700;text-shadow:0 0 20px rgba(255,180,0,.5)}
.teams{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:8px}
@media(max-width:560px){.teams{grid-template-columns:1fr}}
.team{border-radius:18px;padding:14px;border:2px solid var(--tc);background:rgba(255,255,255,.04)}
.team .th{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.team .tn{font-size:1.2rem;font-weight:900;color:var(--tc);display:flex;align-items:center;gap:8px}
.team .sc{font-size:1.8rem;font-weight:900;color:#fff;min-width:44px;text-align:center}
.team .members{display:flex;flex-wrap:wrap;gap:6px;min-height:24px}
.chip{background:rgba(255,255,255,.1);border-radius:20px;padding:3px 11px;font-size:.85rem;font-weight:700}
.chip.me{background:var(--tc);color:#000}
.score-ctrl{display:flex;gap:6px;margin-top:8px}
.score-ctrl .btn{flex:1;padding:6px;font-size:.9rem;border-radius:10px}
.mybadge{text-align:center;border-radius:18px;padding:16px;margin-bottom:16px;border:3px solid var(--tc);background:rgba(255,255,255,.05)}
.mybadge .e{font-size:2.6rem}
.mybadge .t{font-size:1.5rem;font-weight:900;color:var(--tc)}
.mybadge .n{color:rgba(255,255,255,.7)}
.buzzer{width:100%;padding:34px;border:none;border-radius:28px;font-family:'Heebo';font-size:1.8rem;font-weight:900;color:#fff;cursor:pointer;background:radial-gradient(circle at 50% 30%,#FF5A3C,#C81E1E);box-shadow:0 8px 30px rgba(255,60,40,.5);transition:transform .1s}
.buzzer:active{transform:scale(.96)}
.buzzer.done{background:radial-gradient(circle at 50% 30%,#3a3a4a,#22222e);box-shadow:none;cursor:default}
.qbox{background:rgba(0,0,0,.25);border-radius:18px;padding:18px;margin-bottom:14px;border:1px solid rgba(255,255,255,.1)}
.qbox .qmeta{display:flex;justify-content:space-between;color:rgba(255,255,255,.5);font-size:.85rem;margin-bottom:8px}
.qbox .qtext{font-size:1.25rem;font-weight:700;line-height:1.5}
.qbox .qans{margin-top:10px;color:#7BFFBF;font-weight:700;font-size:1.05rem}
.qnav{display:flex;gap:8px;margin-top:12px}
.qnav .btn{flex:1}
.lvl{display:inline-block;border-radius:20px;padding:2px 10px;font-size:.75rem;font-weight:900;color:#000}
.lvl.k{background:#3a9d5d;color:#fff}.lvl.b{background:#d98e2b}.lvl.m{background:#b5483f;color:#fff}
.firstbuzz{background:linear-gradient(135deg,#FFD700,#FF9500);color:#000;border-radius:16px;padding:14px;text-align:center;font-weight:900;font-size:1.2rem;margin-bottom:14px;animation:pop .3s}
@keyframes pop{from{transform:scale(.8)}to{transform:scale(1)}}
.buzzlist{display:flex;flex-direction:column;gap:6px}
.buzzrow{display:flex;justify-content:space-between;background:rgba(255,255,255,.05);border-radius:10px;padding:8px 12px;font-weight:700}
.buzzrow.first{background:rgba(255,215,0,.18);border:1px solid #FFD700}
.tip{color:rgba(255,255,255,.45);font-size:.85rem;text-align:center;margin-top:10px;line-height:1.6}
.status{text-align:center;color:#7BFFBF;font-size:.85rem;margin-top:8px;min-height:18px}
</style>
</head>
<body>
<a class="back" href="index.html">⬅ לתפריט</a>
<div class="wrap">
  <div class="head">
    <div class="logo">🏠</div>
    <h1>מצב בית — קבוצה נגד קבוצה</h1>
    <div class="sub">שחקו מהבית! כל מי שנכנס מצטרף לקבוצה הבאה בתור · הכל מסונכרן בזמן אמת</div>
  </div>

  <!-- בחירה ראשונית -->
  <div id="welcome" class="panel">
    <div class="choice">
      <button class="btn gold" onclick="goCreate()">👨‍🏫 פתח חדר<br><small style="font-weight:400;font-size:.8rem">(מורה / מנחה)</small></button>
      <button class="btn blue" onclick="goJoin()">🙋 הצטרף למשחק<br><small style="font-weight:400;font-size:.8rem">(תלמיד)</small></button>
    </div>
    <div class="tip">המורה פותח חדר ומקבל קוד · התלמידים מקלידים את הקוד ומצטרפים · כל אחד מקבל קבוצה לפי סדר ההצטרפות</div>
  </div>

  <!-- מסך הצטרפות תלמיד -->
  <div id="joinScreen" class="panel hidden">
    <input id="joinCode" maxlength="5" placeholder="קוד החדר (למשל ABCD)" style="text-transform:uppercase">
    <input id="joinName" maxlength="14" placeholder="השם שלי">
    <button class="btn blue" style="width:100%" onclick="doJoin()">🚀 כניסה למשחק</button>
    <div id="joinStatus" class="status"></div>
  </div>

  <!-- אזור המשחק -->
  <div id="game" class="hidden">
    <div class="panel">
      <div class="code-box">
        <div class="lbl">קוד החדר — שתפו עם התלמידים:</div>
        <div class="code" id="roomCode">----</div>
      </div>

      <!-- תג שיוך אישי (תלמיד) -->
      <div id="myBadge" class="mybadge hidden">
        <div class="e" id="myEmoji">🦁</div>
        <div class="t" id="myTeam">—</div>
        <div class="n" id="myName">—</div>
      </div>

      <!-- באזר תלמיד -->
      <button id="buzzer" class="buzzer hidden" onclick="buzz()">🔔 לחצו לתשובה!</button>

      <!-- מי לחץ ראשון -->
      <div id="firstBuzz" class="firstbuzz hidden"></div>

      <!-- לוח קבוצות + ניקוד -->
      <div class="teams" id="teams"></div>
    </div>

    <!-- אזור מנחה: שאלות פרשת תרומה + רשימת באזרים -->
    <div id="hostArea" class="panel hidden">
      <div class="qbox">
        <div class="qmeta"><span>פרשת תרומה · כיתה ב'</span><span id="qCount"></span></div>
        <div class="qtext" id="qText">—</div>
        <div class="qans hidden" id="qAns"></div>
        <div class="qnav">
          <button class="btn ghost sm" onclick="prevQ()">◀ הקודמת</button>
          <button class="btn gold sm" onclick="toggleAns()" id="revealBtn">👁 גלה תשובה</button>
          <button class="btn ghost sm" onclick="nextQ()">הבאה ▶</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn ghost sm" style="flex:1" onclick="resetBuzz()">🔄 אפס באזרים</button>
        <button class="btn ghost sm" style="flex:1" onclick="closeRoom()">🗑 סגור חדר</button>
      </div>
      <div class="buzzlist" id="buzzList"></div>
    </div>

    <div class="status" id="syncStatus"></div>
  </div>
</div>

<script>
const FB='https://album-bea15-default-rtdb.firebaseio.com/samsongames';
const TEAMS=[
  {key:'lions',    name:'אריות',  emoji:'🦁', color:'#F5A623'},
  {key:'eagles',   name:'נשרים',  emoji:'🦅', color:'#2E9BFF'},
  {key:'lionesses',name:'לביאות', emoji:'🐆', color:'#21C97A'},
  {key:'storms',   name:'ברקים',  emoji:'⚡', color:'#A55BFF'},
];
const QUESTIONS=[
 {q:'מה ביקש הקב"ה מבני ישראל לתת בתחילת הפרשה?',a:'תְּרוּמָה — נדבה לבניית המשכן ("וְיִקְחוּ לִי תְּרוּמָה").',l:'k'},
 {q:'מה בנו בני ישראל מכל התרומות?',a:'את הַמִּשְׁכָּן.',l:'k'},
 {q:'מה זה המשכן?',a:'בית מיוחד ונייד לה\' במדבר, שאפשר לפרק ולהקים בכל מסע.',l:'k'},
 {q:'מי תרם למשכן?',a:'כל מי שֶׁנָּדַב לִבּוֹ — לא בכפייה.',l:'k'},
 {q:'מהי המתכת היקרה ביותר שתרמו? (רמז: צהוב נוצץ)',a:'זָהָב.',l:'k'},
 {q:'השלם: "וְעָשׂוּ לִי מִקְדָּשׁ וְ____ בְּתוֹכָם".',a:'וְשָׁכַנְתִּי — שה\' ישכון בתוך עם ישראל.',l:'k'},
 {q:'מה היה מונח בתוך הָאָרוֹן?',a:'לוּחוֹת הַבְּרִית.',l:'k'},
 {q:'כמה קנים (זרועות) היו למנורה?',a:'שִׁבְעָה (7).',l:'k'},
 {q:'מאיזה חומר עשו את המנורה?',a:'זָהָב טָהוֹר.',l:'k'},
 {q:'מה הניחו על השולחן שבמשכן?',a:'לֶחֶם הַפָּנִים.',l:'k'},
 {q:'איזה כלי כיסה את הארון, ועליו שתי דמויות עם כנפיים?',a:'הַכַּפֹּרֶת, ועליה שני הַכְּרוּבִים.',l:'b'},
 {q:'כיצד עמדו הכרובים זה מול זה?',a:'פְּנֵיהֶם אִישׁ אֶל אָחִיו, וכנפיהם פרושות למעלה.',l:'b'},
 {q:'מאיזה עץ עשו את הארון ואת קרשי המשכן?',a:'עֲצֵי שִׁטִּים.',l:'b'},
 {q:'איך נשאו את הארון ממקום למקום?',a:'בְּבַדִּים (מוטות) שהושחלו בטבעות הזהב שבצדיו.',l:'b'},
 {q:'נקוב שלושה סוגי חוטים צבעוניים שתרמו לבדים.',a:'תְּכֵלֶת, אַרְגָּמָן, תּוֹלַעַת שָׁנִי.',l:'b'},
 {q:'המנורה נעשתה מחתיכת זהב אחת — איך קוראים לזה?',a:'מִקְשָׁה אַחַת.',l:'b'},
 {q:'שלוש מתכות נתרמו למשכן — מה הן?',a:'זָהָב, כֶּסֶף, נְחֹשֶׁת.',l:'b'},
 {q:'מה עשו עם השמן שתרמו?',a:'שֶׁמֶן לַמָּאוֹר — להדליק בו את המנורה.',l:'b'},
 {q:'הפרשה פותחת: "וַיְדַבֵּר ה\' אֶל ____ לֵּאמֹר". אל מי?',a:'אֶל מֹשֶׁה.',l:'b'},
 {q:'למה ביקש ה\' דווקא ממי "שֶׁיִּדְּבֶנּוּ לִבּוֹ"?',a:'כי תרומה צריכה לבוא מתוך רצון ושמחה מהלב.',l:'m'},
 {q:'מהו המזבח שעשו מעצי שיטים וציפו בנחושת?',a:'מִזְבַּח הַנְּחֹשֶׁת (מזבח העולה).',l:'m'},
 {q:'איזה בד גדול הקיף את חצר המשכן?',a:'קַלְעֵי הֶחָצֵר — יריעות שֵׁשׁ.',l:'m'},
 {q:'מבין מה "נועד" הקב"ה לדבר עם משה?',a:'מִבֵּין שְׁנֵי הַכְּרֻבִים ("וְנוֹעַדְתִּי לְךָ שָׁם").',l:'m'},
 {q:'מה הקשר בין פרשת תרומה לבית הכנסת שלנו היום?',a:'בית הכנסת הוא "מקדש מעט" — כמו המשכן.',l:'m'},
];
const LVL={k:['קל','k'],b:['בינוני','b'],m:['מאתגר','m']};

let role=null;        // 'host' | 'player'
let roomCode=null;
let myId=null;
let myTeam=null;
let poll=null;
let lastRoom={};

const $=id=>document.getElementById(id);
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function rndCode(){let s='';const L='ABCDEFGHJKLMNPQRSTUVWXYZ';for(let i=0;i<4;i++)s+=L[Math.floor(Math.random()*L.length)];return s;}
function uid(){return 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

async function fbGet(path){try{const r=await fetch(FB+path+'.json');return r.ok?(await r.json()):null;}catch(e){return null;}}
async function fbPut(path,data){try{await fetch(FB+path+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});return true;}catch(e){return false;}}
async function fbDel(path){try{await fetch(FB+path+'.json',{method:'DELETE'});}catch(e){}}

function goCreate(){ role='host'; createRoom(); }
function goJoin(){ $('welcome').classList.add('hidden'); $('joinScreen').classList.remove('hidden'); }

async function createRoom(){
  $('welcome').classList.add('hidden');
  let code; let exists=true; let guard=0;
  do{ code=rndCode(); exists=await fbGet('/rooms/'+code); guard++; }while(exists&&guard<6);
  roomCode=code;
  await fbPut('/rooms/'+code,{created:Date.now(),qIndex:0,reveal:false,players:{},scores:{lions:0,eagles:0,lionesses:0,storms:0}});
  $('game').classList.remove('hidden');
  $('hostArea').classList.remove('hidden');
  $('roomCode').textContent=code;
  renderQ();
  startPoll();
}

async function doJoin(){
  const code=$('joinCode').value.trim().toUpperCase();
  const name=$('joinName').value.trim();
  if(code.length<3){$('joinStatus').textContent='הקלידו קוד תקין';return;}
  if(!name){$('joinStatus').textContent='הקלידו שם';return;}
  $('joinStatus').textContent='מתחבר…';
  const room=await fbGet('/rooms/'+code);
  if(!room){$('joinStatus').textContent='❌ לא נמצא חדר עם הקוד הזה';return;}
  role='player'; roomCode=code;
  const players=room.players||{};
  const count=Object.keys(players).length;
  myTeam=TEAMS[count%4].key;            // שיוך מעגלי לפי סדר הכניסה
  myId=uid();
  await fbPut('/rooms/'+code+'/players/'+myId,{name:name,team:myTeam,joined:Date.now()});
  $('joinScreen').classList.add('hidden');
  $('game').classList.remove('hidden');
  $('roomCode').textContent=code;
  const t=TEAMS.find(x=>x.key===myTeam);
  $('myBadge').classList.remove('hidden');
  $('myBadge').style.setProperty('--tc',t.color);
  $('myEmoji').textContent=t.emoji;
  $('myTeam').textContent='קבוצת ה'+t.name;
  $('myName').textContent=name;
  $('buzzer').classList.remove('hidden');
  startPoll();
}

function startPoll(){ render(lastRoom); pollOnce(); poll=setInterval(pollOnce,2000); }
async function pollOnce(){
  if(!roomCode)return;
  const room=await fbGet('/rooms/'+roomCode);
  if(room===null){ if(role==='player'){$('syncStatus').textContent='⚠ החדר נסגר על ידי המורה';} return; }
  lastRoom=room||{};
  render(lastRoom);
}

function render(room){
  // לוח קבוצות
  const players=room.players||{};
  const scores=room.scores||{};
  const byTeam={lions:[],eagles:[],lionesses:[],storms:[]};
  Object.entries(players).forEach(([pid,p])=>{ if(byTeam[p.team])byTeam[p.team].push({pid,...p}); });
  $('teams').innerHTML=TEAMS.map(t=>{
    const mem=byTeam[t.key].sort((a,b)=>a.joined-b.joined);
    const chips=mem.map(m=>`<span class="chip${m.pid===myId?' me':''}">${esc(m.name)}</span>`).join('')||'<span style="color:rgba(255,255,255,.3);font-size:.85rem">ממתינים…</span>';
    const ctrl=role==='host'?`<div class="score-ctrl">
        <button class="btn ghost" onclick="addScore('${t.key}',-1)">−1</button>
        <button class="btn ghost" onclick="addScore('${t.key}',1)">+1</button>
        <button class="btn gold" onclick="addScore('${t.key}',3)">+3</button></div>`:'';
    return `<div class="team" style="--tc:${t.color}">
      <div class="th"><div class="tn">${t.emoji} ${t.name}</div><div class="sc">${scores[t.key]||0}</div></div>
      <div class="members">${chips}</div>${ctrl}</div>`;
  }).join('');

  // באזרים
  const buzzes=room.buzzes||{};
  const list=Object.values(buzzes).sort((a,b)=>a.t-b.t);
  if(list.length){
    const first=list[0];
    const ft=TEAMS.find(x=>x.key===first.team);
    $('firstBuzz').classList.remove('hidden');
    $('firstBuzz').textContent=`${ft.emoji} ${first.name} (${ft.name}) ענה ראשון!`;
  }else{ $('firstBuzz').classList.add('hidden'); }

  if(role==='host'){
    $('buzzList').innerHTML=list.map((b,i)=>{
      const t=TEAMS.find(x=>x.key===b.team);
      return `<div class="buzzrow${i===0?' first':''}"><span>${i===0?'🥇 ':''}${esc(b.name)} · ${t.emoji} ${t.name}</span><span>#${i+1}</span></div>`;
    }).join('')||'<div style="color:rgba(255,255,255,.3);text-align:center;padding:6px">אין באזרים עדיין</div>';
    // סנכרון שאלה
    if(typeof room.qIndex==='number'&&room.qIndex!==curQ){curQ=room.qIndex;renderQ(room.reveal);}
  }

  // תלמיד: סנכרון שאלה + מצב באזר
  if(role==='player'){
    const iBuzzed=buzzes[myId];
    const bz=$('buzzer');
    if(iBuzzed){ bz.classList.add('done'); bz.textContent='✔ לחצת!'; }
    else{ bz.classList.remove('done'); bz.textContent='🔔 לחצו לתשובה!'; }
  }
  $('syncStatus').textContent='🟢 מסונכרן · '+Object.keys(players).length+' שחקנים בחדר';
}

// ===== מנחה: ניקוד =====
async function addScore(team,n){
  const cur=(lastRoom.scores&&lastRoom.scores[team])||0;
  const val=Math.max(0,cur+n);
  if(!lastRoom.scores)lastRoom.scores={};
  lastRoom.scores[team]=val;
  render(lastRoom);
  await fbPut('/rooms/'+roomCode+'/scores/'+team,val);
}

// ===== מנחה: שאלות =====
let curQ=0;
function renderQ(showAns){
  const q=QUESTIONS[curQ];
  $('qCount').textContent=`שאלה ${curQ+1}/${QUESTIONS.length}`;
  const lv=LVL[q.l];
  $('qText').innerHTML=`<span class="lvl ${lv[1]}">${lv[0]}</span> ${esc(q.q)}`;
  $('qAns').textContent='תשובה: '+q.a;
  if(showAns){ $('qAns').classList.remove('hidden'); $('revealBtn').textContent='🙈 הסתר'; }
  else{ $('qAns').classList.add('hidden'); $('revealBtn').textContent='👁 גלה תשובה'; }
}
async function nextQ(){ curQ=(curQ+1)%QUESTIONS.length; renderQ(false); await syncQ(false); }
async function prevQ(){ curQ=(curQ-1+QUESTIONS.length)%QUESTIONS.length; renderQ(false); await syncQ(false); }
async function toggleAns(){ const show=$('qAns').classList.contains('hidden'); renderQ(show); await syncQ(show); }
async function syncQ(reveal){ await fbPut('/rooms/'+roomCode+'/qIndex',curQ); await fbPut('/rooms/'+roomCode+'/reveal',reveal); }

// ===== באזר תלמיד =====
async function buzz(){
  if(!myId)return;
  await fbPut('/rooms/'+roomCode+'/buzzes/'+myId,{name:$('myName').textContent,team:myTeam,t:Date.now()});
  pollOnce();
}
async function resetBuzz(){ await fbDel('/rooms/'+roomCode+'/buzzes'); lastRoom.buzzes={}; render(lastRoom); }
async function closeRoom(){ if(confirm('לסגור את החדר? כל הנתונים יימחקו.')){ await fbDel('/rooms/'+roomCode); clearInterval(poll); location.href='index.html'; } }

window.addEventListener('beforeunload',()=>{ if(role==='player'&&roomCode&&myId){ navigator.sendBeacon&&fbDel('/rooms/'+roomCode+'/players/'+myId); } });
</script>
